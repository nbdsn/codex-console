name: Windows EXE Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller codex_register.spec --clean --noconfirm

      - name: Rename exe
        shell: pwsh
        run: |
          Move-Item -Path "dist/codex-console.exe" -Destination "dist/codex-console-windows-x64.exe" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-console-windows-x64.exe
          path: dist/codex-console-windows-x64.exe
          if-no-files-found: error
